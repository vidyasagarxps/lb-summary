<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Boarding Summary</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #fff;
  min-height: 100%;
  width: 100%;
  overflow-y: auto !important;
  overflow-x: hidden;
  font-size: 22px;
}
.wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
  padding: 16px;
  min-height: 100vh;
}
.card {
  display: flex;
  flex-direction: column;
  border-radius: 8px;
  overflow: visible;
}
.card-insights { border-left: 5px solid #2563eb; background: #f0f5ff; }
.card-risks { border-left: 5px solid #d97706; background: #fffbeb; }
.card-actions { border-left: 5px solid #059669; background: #ecfdf5; }

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 22px 14px;
  flex-shrink: 0;
}
.card-icon { width: 26px; height: 26px; flex-shrink: 0; }
.card-title {
  font-size: 24px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.title-insights { color: #1d4ed8; }
.title-risks { color: #b45309; }
.title-actions { color: #047857; }

.card-count {
  font-size: 15px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 10px;
  margin-left: 4px;
}
.count-insights { background: #dbeafe; color: #1d4ed8; }
.count-risks { background: #fef3c7; color: #b45309; }
.count-actions { background: #d1fae5; color: #047857; }

.card ul {
  list-style: none;
  padding: 0 22px 18px;
}
.card li {
  font-size: 1.4rem;
  line-height: 1.75;
  color: #1f2937;
  padding: 14px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.card li:last-child { border-bottom: none; }
.card li span {
  word-wrap: break-word;
  white-space: normal;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 10px;
}
.dot-default-insights { background: #2563eb; }
.dot-default-risks { background: #d97706; }
.dot-default-actions { background: #059669; }

.metric-highlight { font-weight: 700; color: #0f172a; }

.skeleton {
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 22px;
}
.skeleton-line {
  height: 18px;
  border-radius: 4px;
  background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.skeleton-line:nth-child(1) { width: 90%; }
.skeleton-line:nth-child(2) { width: 75%; }
.skeleton-line:nth-child(3) { width: 85%; }
.skeleton-line:nth-child(4) { width: 60%; }
.skeleton-line:nth-child(5) { width: 80%; }
.skeleton-line:nth-child(6) { width: 70%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.error-text {
  color: #dc2626;
  padding: 22px;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.retry-btn {
  background: #fee2e2;
  color: #dc2626;
  border: none;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}
.retry-btn:hover { background: #fecaca; }
</style>
</head>
<body>
<div class="wrapper" id="summaryText"></div>
<script>
var SNOWFLAKE_URL = "https://ARXPS-XPANSE.snowflakecomputing.com";
var AGENT_PATH = "/api/v2/databases/XPS_AID/schemas/LOAN_BOARDING/agents/LB_PBI_AGENT:run";
var PAT = 'eyJraWQiOiI5MzcyNjA2OTQ3MzU5NTQiLCJhbGciOiJFUzI1NiJ9.eyJwIjoiMTQzMDE0NjUwMTM6MTQzMDE0NjY3NTciLCJpc3MiOiJTRjoxMDQzIiwiZXhwIjoxNzgxMTE4MjQ3fQ.JbOjs_9FuHuB7AfTbAgtcQAgx_tAfm5JYI2UvF-X0ggKcBC0Hi3F12eS-wF31jobIcXYeZETIlstNPKybOAKjA'


var QUERIES = {
  exec_summary:  { label: "Executive Summary",              question: "Executive Summary" },
  doc_class:     { label: "Document Classification Summary", question: "Document Classification Summary" },
  field_extract: { label: "Field Extraction Summary",        question: "Field Extraction Summary" },
  rule_eval:     { label: "Rule Evaluation Summary",         question: "Rule Evaluation Summary" },
  hil:           { label: "Human in Loop Summary",           question: "Human in Loop Summary" },
  proc_time:     { label: "Processing Time Breakdown",       question: "Processing Time Breakdown" }
};

var SECTION_CONFIG = {
  insights: {
    title: 'Key Insights',
    key: 'insights',
    cardClass: 'card-insights',
    titleClass: 'title-insights',
    countClass: 'count-insights',
    dotClass: 'dot-default-insights',
    icon: '<svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 4 12.7V17H8v-2.3A7 7 0 0 1 12 2z"/></svg>'
  },
  risks: {
    title: 'Risks',
    key: 'risks',
    cardClass: 'card-risks',
    titleClass: 'title-risks',
    countClass: 'count-risks',
    dotClass: 'dot-default-risks',
    icon: '<svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
  },
  actions: {
    title: 'Actions',
    key: 'actions',
    cardClass: 'card-actions',
    titleClass: 'title-actions',
    countClass: 'count-actions',
    dotClass: 'dot-default-actions',
    icon: '<svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
  }
};

var params = new URLSearchParams(window.location.search);
var queryId = params.get('q');
var section = params.get('section') || 'insights';
var startDate = params.get('start') || '';
var endDate = params.get('end') || '';

var DATE_FILTER = '';
if (startDate && endDate) {
  DATE_FILTER = " for the period from " + startDate + " to " + endDate;
}

var SUMMARY_PROMPT = DATE_FILTER + " — Respond in EXACTLY this JSON format with no other text: {\"insights\": [\"insight 1\", \"insight 2\", \"insight 3\"], \"risks\": [\"risk 1\", \"risk 2\", \"risk 3\"], \"actions\": [\"action 1\", \"action 2\", \"action 3\"]}. IMPORTANT: Do NOT use markdown formatting like ** or * in your response. Each bullet must start with a plain label followed by a colon and a detailed explanation with specific numbers, percentages, and metrics from the data. Example: 'Turnaround Time: Fell to 92% from 99% SLA, with document processing delays increasing by 15% across the pipeline.' Each array must have exactly 3 detailed, metric-driven bullet points. No markdown, no SQL, no tables, no asterisks.";

var currentQueryId = null;

if (queryId && QUERIES[queryId]) {
  currentQueryId = queryId;
  runQuery(queryId);
} else {
  document.getElementById('summaryText').innerHTML = '<div class="error-text">No query configured.</div>';
}

function showSkeleton() {
  var cfg = SECTION_CONFIG[section];
  var el = document.getElementById('summaryText');
  el.innerHTML =
    '<div class="card ' + cfg.cardClass + '">' +
      '<div class="card-header">' + cfg.icon +
        '<span class="card-title ' + cfg.titleClass + '">' + cfg.title + '</span>' +
      '</div>' +
      '<div class="skeleton">' +
        '<div class="skeleton-line"></div><div class="skeleton-line"></div>' +
        '<div class="skeleton-line"></div><div class="skeleton-line"></div>' +
        '<div class="skeleton-line"></div><div class="skeleton-line"></div>' +
      '</div>' +
    '</div>';
}

async function runQuery(id) {
  var q = QUERIES[id];
  showSkeleton();

  try {
    var res = await fetch(SNOWFLAKE_URL + AGENT_PATH, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + PAT,
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        messages: [{ role: "user", content: [{ type: "text", text: q.question + SUMMARY_PROMPT }] }],
        stream: false
      })
    });
    if (!res.ok) throw new Error("API " + res.status);
    var data = await res.json();
    var html = extractSection(data);
    document.getElementById('summaryText').innerHTML = html || buildEmptyState();
  } catch (err) {
    document.getElementById('summaryText').innerHTML =
      '<div class="error-text">' +
        '<span>Error: ' + esc(err.message) + '</span>' +
        '<button class="retry-btn" onclick="runQuery(\'' + id + '\')">Retry</button>' +
      '</div>';
  }
}

function extractSection(data) {
  if (!data.content || !data.content.length) return '';
  var textBlocks = [];
  for (var i = 0; i < data.content.length; i++) {
    if (data.content[i].type === 'text' && data.content[i].text) {
      textBlocks.push(data.content[i].text);
    }
  }
  if (textBlocks.length === 0) return '';
  var raw = textBlocks[textBlocks.length - 1];
  try {
    var match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      var json = JSON.parse(match[0]);
      var cfg = SECTION_CONFIG[section];
      if (cfg && json[cfg.key]) {
        return buildCard(cfg, json[cfg.key]);
      }
    }
  } catch (e) {}
  return '<p style="padding:20px;font-size:18px;color:#444;">' + esc(raw) + '</p>';
}

function cleanMarkdown(text) {
  return text
    .replace(/\*\*\*(.*?)\*\*\*/g, '$1')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/^[\*\-]\s+/g, '')
    .replace(/`(.*?)`/g, '$1')
    .trim();
}

function buildCard(cfg, items) {
  var html = '<div class="card ' + cfg.cardClass + '">';
  html += '<div class="card-header">' + cfg.icon;
  html += '<span class="card-title ' + cfg.titleClass + '">' + cfg.title + '</span>';
  html += '<span class="card-count ' + cfg.countClass + '">' + items.length + '</span>';
  html += '</div>';
  html += '<ul>';
  for (var i = 0; i < items.length; i++) {
    var rawText = typeof items[i] === 'object' ? items[i].text || '' : String(items[i]);
    rawText = cleanMarkdown(rawText);
    var text = esc(rawText);

    text = highlightMetrics(text);

    var colonIdx = text.indexOf(':');
    if (colonIdx > 0 && colonIdx < 60) {
      text = '<strong>' + text.substring(0, colonIdx) + '</strong>:' + text.substring(colonIdx + 1);
    }

    html += '<li>';
    html += '<span class="status-dot ' + cfg.dotClass + '"></span>';
    html += '<span>' + text + '</span>';
    html += '</li>';
  }
  html += '</ul></div>';
  return html;
}

function buildEmptyState() {
  var cfg = SECTION_CONFIG[section];
  return '<div class="card ' + cfg.cardClass + '">' +
    '<div class="card-header">' + cfg.icon +
      '<span class="card-title ' + cfg.titleClass + '">' + cfg.title + '</span>' +
    '</div>' +
    '<p style="padding:22px;font-size:18px;color:#6b7280;">No data available for this period.</p>' +
  '</div>';
}

function highlightMetrics(text) {
  return text.replace(/(\d+[\.,]?\d*\s*%)/g, '<span class="metric-highlight">$1</span>')
             .replace(/(\d{1,3}(?:,\d{3})+)/g, '<span class="metric-highlight">$1</span>');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
