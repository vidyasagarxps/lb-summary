<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Boarding Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; min-height: 100vh; }

  .dev-panel { background: #fef3c7; border-bottom: 2px solid #f59e0b; padding: 16px 24px; }
  .dev-tag { display: inline-block; background: #f59e0b; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }
  .dev-panel h2 { font-size: 14px; color: #92400e; margin-bottom: 8px; }
  .dev-panel p { font-size: 12px; color: #78350f; margin-bottom: 12px; }
  .dev-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .dev-row select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; min-width: 280px; }
  .dev-row button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-lock { background: #10b981; color: #fff; }
  .btn-lock:hover { background: #059669; }
  .btn-preview { background: #3b82f6; color: #fff; }
  .btn-preview:hover { background: #2563eb; }
  .url-box { margin-top: 12px; display: none; }
  .url-box label { font-size: 11px; color: #92400e; font-weight: 600; display: block; margin-bottom: 4px; }
  .url-box input { width: 100%; padding: 8px 12px; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; font-size: 12px; font-family: monospace; color: #374151; }
  .url-box p { font-size: 11px; color: #78350f; margin-top: 6px; }

  #summaryText { padding: 16px 20px; font-size: 13px; line-height: 1.8; color: #334155; width: 100%; }
  #summaryText strong { color: #1b2a4a; }
  #summaryText p { margin: 4px 0; }
  #summaryText h3 { font-size: 13px; margin: 10px 0 4px; color: #1b2a4a; }
  .date-badge { display: inline-block; background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; padding: 4px 12px; border-radius: 4px; font-size: 11px; margin: 8px 20px; }
  .loading { display: flex; align-items: center; gap: 10px; color: #94a3b8; padding: 24px 20px; }
  .spinner { width: 18px; height: 18px; border: 2px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-text { color: #dc2626; }
  .empty { text-align: center; color: #64748b; padding: 60px 20px; font-size: 13px; }
</style>
</head>
<body>

<div id="devPanel" class="dev-panel" style="display:none;">
  <span class="dev-tag">Developer Mode</span>
  <h2>Configure Summary Page</h2>
  <p>Select one verified query for this Power BI page. Use a separate page URL for each query.</p>
  <div class="dev-row">
    <select id="querySelect"></select>
    <button class="btn-preview" onclick="previewQuery()">Preview</button>
    <button class="btn-lock" onclick="lockQuery()">Get Embed URL</button>
  </div>
  <div class="url-box" id="urlBox">
    <label>Embed this URL in Power BI for this page:</label>
    <input type="text" id="embedUrl" readonly onclick="this.select()">
    <p>Each Power BI page should use a different query URL.</p>
  </div>
</div>

<div id="dateBadge"></div>
<div id="summaryText"></div>

<script>
var SNOWFLAKE_URL = "https://ARXPS-XPANSE.snowflakecomputing.com";
var AGENT_PATH = "/api/v2/databases/XPS_AID/schemas/LOAN_BOARDING/agents/LB_PBI_AGENT:run";
var PAT = 'eyJraWQiOiI5MzcyNjA2OTQ3MzU5NTQiLCJhbGciOiJFUzI1NiJ9.eyJwIjoiMTQzMDE0NjUwMTM6MTQzMDE0NjY3NTciLCJpc3MiOiJTRjoxMDQzIiwiZXhwIjoxNzgxMTE4MjQ3fQ.JbOjs_9FuHuB7AfTbAgtcQAgx_tAfm5JYI2UvF-X0ggKcBC0Hi3F12eS-wF31jobIcXYeZETIlstNPKybOAKjA'


var QUERIES = {
  exec_summary:  { label: "Executive Summary",              question: "Executive Summary" },
  doc_class:     { label: "Document Classification Summary", question: "Document Classification Summary" },
  field_extract: { label: "Field Extraction Summary",        question: "Field Extraction Summary" },
  rule_eval:     { label: "Rule Evaluation Summary",         question: "Rule Evaluation Summary" },
  hil:           { label: "Human in Loop Summary",           question: "Human in Loop Summary" },
  proc_time:     { label: "Processing Time Breakdown",       question: "Processing Time Breakdown" }
};

var params = new URLSearchParams(window.location.search);
var isDev = params.get('mode') === 'dev';
var queryId = params.get('q');
var startDate = params.get('start') || '';
var endDate = params.get('end') || '';

var DATE_FILTER = '';
if (startDate && endDate) {
  DATE_FILTER = " for the period from " + startDate + " to " + endDate;
  document.getElementById('dateBadge').innerHTML = '<span class="date-badge">Filtering: ' + startDate + ' to ' + endDate + '</span>';
}

var SUMMARY_PROMPT = DATE_FILTER + " — Provide only a brief business summary in 3-5 sentences. No tables, no raw data, no detailed breakdowns, no SQL. Just a high-level narrative paragraph.";

(function init() {
  if (isDev) {
    document.getElementById('devPanel').style.display = 'block';
    var select = document.getElementById('querySelect');
    var keys = Object.keys(QUERIES);
    for (var i = 0; i < keys.length; i++) {
      var opt = document.createElement('option');
      opt.value = keys[i];
      opt.textContent = QUERIES[keys[i]].label;
      select.appendChild(opt);
    }
    document.getElementById('summaryText').innerHTML = '<div class="empty">Select a query and click Preview to see the summary.</div>';
  } else if (queryId && QUERIES[queryId]) {
    runQuery(queryId);
  } else {
    document.getElementById('summaryText').innerHTML = '<div class="empty">No query configured. Open with <strong>?mode=dev</strong> to set up.</div>';
  }
})();

function previewQuery() {
  var id = document.getElementById('querySelect').value;
  if (id) runQuery(id);
}

function lockQuery() {
  var id = document.getElementById('querySelect').value;
  if (!id) return;
  var base = window.location.origin + window.location.pathname;
  var url = base + '?q=' + id;
  document.getElementById('embedUrl').value = url;
  document.getElementById('urlBox').style.display = 'block';
  document.getElementById('embedUrl').select();
}

async function runQuery(id) {
  var q = QUERIES[id];
  var el = document.getElementById('summaryText');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Fetching summary...</span></div>';

  try {
    var res = await fetch(SNOWFLAKE_URL + AGENT_PATH, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + PAT,
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        messages: [{ role: "user", content: [{ type: "text", text: q.question + SUMMARY_PROMPT }] }],
        stream: false
      })
    });

    if (!res.ok) throw new Error("API " + res.status);
    var data = await res.json();
    el.innerHTML = extractSummary(data) || '<p>No summary available.</p>';
  } catch (err) {
    el.innerHTML = '<p class="error-text">Error: ' + esc(err.message) + '</p>';
  }
}

function extractSummary(data) {
  if (!data.content || !data.content.length) return '';
  var textBlocks = [];
  for (var i = 0; i < data.content.length; i++) {
    if (data.content[i].type === 'text' && data.content[i].text) {
      textBlocks.push(data.content[i].text);
    }
  }
  if (textBlocks.length > 0) return fmt(textBlocks[textBlocks.length - 1]);
  return '';
}

function fmt(text) {
  if (!text) return '';
  var h = esc(text);
  h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.*?)\*/g, '<em>$1</em>');
  h = h.replace(/`(.*?)`/g, '<code style="background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>');
  h = h.replace(/### (.*?)(\n|$)/g, '<h3>$1</h3>');
  h = h.replace(/## (.*?)(\n|$)/g, '<h3>$1</h3>');
  h = h.replace(/# (.*?)(\n|$)/g, '<h3>$1</h3>');
  h = h.replace(/\n- (.*?)(?=\n|$)/g, '<br>&bull; $1');
  h = h.replace(/\n\n/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  return '<p>' + h + '</p>';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</body>
</html>
