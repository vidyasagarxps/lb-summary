<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Boarding Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; height: 100%; width: 100%; overflow-x: hidden; overflow-y: auto; }
  .wrapper { display: flex; flex-direction: column; min-height: 100%; width: 100%; padding: 16px; }
  .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; flex: 1; display: flex; flex-direction: column; }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-shrink: 0; padding-bottom: 14px; border-bottom: 1px solid #e5e7eb; }
  .card-title { font-size: 18px; font-weight: 700; color: #111; text-transform: uppercase; letter-spacing: 0.5px; }
  .card ul { list-style: none; padding: 0; flex: 1; }
  .card li { font-size: 15px; line-height: 1.9; color: #333; padding: 14px 0; border-bottom: 1px solid #f3f4f6; display: flex; gap: 12px; }
  .card li:last-child { border-bottom: none; }
  .bullet { flex-shrink: 0; margin-top: 4px; font-size: 11px; }
  .bullet-insights { color: #2563eb; }
  .bullet-risks { color: #d97706; }
  .bullet-actions { color: #059669; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 10px; color: #999; min-height: 200px; font-size: 15px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-text { color: #dc2626; padding: 24px; font-size: 14px; }
  .empty-section { padding: 24px; color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="wrapper" id="summaryText"></div>
<script>
var SNOWFLAKE_URL = "https://ARXPS-XPANSE.snowflakecomputing.com";
var AGENT_PATH = "/api/v2/databases/XPS_AID/schemas/LOAN_BOARDING/agents/LB_PBI_AGENT:run";
var PAT = 'eyJraWQiOiI5MzcyNjA2OTQ3MzU5NTQiLCJhbGciOiJFUzI1NiJ9.eyJwIjoiMTQzMDE0NjUwMTM6MTQzMDE0NjY3NTciLCJpc3MiOiJTRjoxMDQzIiwiZXhwIjoxNzgxMTE4MjQ3fQ.JbOjs_9FuHuB7AfTbAgtcQAgx_tAfm5JYI2UvF-X0ggKcBC0Hi3F12eS-wF31jobIcXYeZETIlstNPKybOAKjA'


var QUERIES = {
  exec_summary:  { question: "Executive Summary" },
  doc_class:     { question: "Document Classification Summary" },
  field_extract: { question: "Field Extraction Summary" },
  rule_eval:     { question: "Rule Evaluation Summary" },
  hil:           { question: "Human in Loop Summary" },
  proc_time:     { question: "Processing Time Breakdown" }
};

var SECTION_CONFIG = {
  insights: { title: 'Key Insights', key: 'insights', bullet: 'bullet-insights' },
  risks:    { title: 'Risks',        key: 'risks',    bullet: 'bullet-risks' },
  actions:  { title: 'Actions',      key: 'actions',  bullet: 'bullet-actions' }
};

var params = new URLSearchParams(window.location.search);
var queryId = params.get('q');
var section = params.get('section') || 'insights';
var startDate = params.get('start') || '';
var endDate = params.get('end') || '';

var CACHE_KEY = 'lb_' + queryId + '_' + startDate + '_' + endDate;

var DATE_FILTER = '';
if (startDate && endDate) {
  DATE_FILTER = " for the period from " + startDate + " to " + endDate;
}

var SUMMARY_PROMPT = DATE_FILTER + " — Reply ONLY with JSON, no other text: {\"insights\":[\"...\",\"...\",\"...\"],\"risks\":[\"...\",\"...\",\"...\"],\"actions\":[\"...\",\"...\",\"...\"]}. Each bullet: BoldLabel: detail with metrics. 3 per section. No markdown, no SQL.";

if (queryId && QUERIES[queryId]) {
  loadSection();
} else {
  document.getElementById('summaryText').innerHTML = '<div class="loading">No query configured.</div>';
}

async function loadSection() {
  var el = document.getElementById('summaryText');

  var cached = sessionStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      var json = JSON.parse(cached);
      el.innerHTML = renderSection(json);
      return;
    } catch (e) {}
  }

  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Generating summary...</span></div>';

  try {
    var json = await fetchFromAgent(queryId);
    if (json) {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify(json));
      el.innerHTML = renderSection(json);
    } else {
      el.innerHTML = '<p class="empty-section">No structured summary returned.</p>';
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Retrying...</span></div>';
      retryOnce(el);
    } else {
      el.innerHTML = '<p class="error-text">Error: ' + esc(err.message) + '</p>';
    }
  }
}

async function fetchFromAgent(id) {
  var q = QUERIES[id];
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 180000);

  var res = await fetch(SNOWFLAKE_URL + AGENT_PATH, {
    method: "POST",
    signal: controller.signal,
    headers: {
      "Authorization": "Bearer " + PAT,
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({
      messages: [{ role: "user", content: [{ type: "text", text: q.question + SUMMARY_PROMPT }] }],
      stream: false
    })
  });

  clearTimeout(timeout);
  if (!res.ok) throw new Error("API " + res.status);

  var data = await res.json();
  var raw = extractRaw(data);

  try {
    var match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      var json = JSON.parse(match[0]);
      if (json.insights || json.risks || json.actions) return json;
    }
  } catch (e) {}
  return null;
}

async function retryOnce(el) {
  try {
    var json = await fetchFromAgent(queryId);
    if (json) {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify(json));
      el.innerHTML = renderSection(json);
    } else {
      el.innerHTML = '<p class="empty-section">Summary unavailable. Please refresh the page.</p>';
    }
  } catch (e) {
    el.innerHTML = '<p class="error-text">Summary unavailable. Please refresh the page.</p>';
  }
}

function extractRaw(data) {
  if (!data.content || !data.content.length) return '';
  for (var i = data.content.length - 1; i >= 0; i--) {
    if (data.content[i].type === 'text' && data.content[i].text) return data.content[i].text;
  }
  return '';
}

function renderSection(json) {
  var cfg = SECTION_CONFIG[section];
  if (!cfg) return '<p class="empty-section">Invalid section.</p>';
  var items = json[cfg.key];
  if (!items || items.length === 0) {
    return '<div class="card"><div class="card-header"><span class="card-title">' + cfg.title + '</span></div><p class="empty-section">No ' + cfg.title.toLowerCase() + ' identified for this period.</p></div>';
  }
  return buildCard(cfg.title, items, cfg.bullet);
}

function buildCard(title, items, bulletCls) {
  var html = '<div class="card">';
  html += '<div class="card-header"><span class="card-title">' + title + '</span></div>';
  html += '<ul>';
  for (var i = 0; i < items.length; i++) {
    var text = esc(items[i]);
    var colonIdx = text.indexOf(':');
    if (colonIdx > 0 && colonIdx < 60) {
      text = '<strong>' + text.substring(0, colonIdx) + '</strong>:' + text.substring(colonIdx + 1);
    }
    html += '<li><span class="bullet ' + bulletCls + '">&#9679;</span><span>' + text + '</span></li>';
  }
  html += '</ul></div>';
  return html;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
